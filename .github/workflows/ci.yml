name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    needs: [lint, format, typecheck]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-only
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  migrate:
    name: DB Migrate
    needs: [build]
    # Only on a push to dev or main — never an unmerged PR, and never another
    # branch (gating here, before `environment` attaches, keeps the Preview/
    # Production secrets off unrelated branch pushes).
    if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    # Select the matching GitHub Environment so secrets.SUPABASE_* resolve to the
    # right project's credentials: main -> Production, dev -> Preview.
    environment: ${{ github.ref_name == 'main' && 'Production' || 'Preview' }}
    # Read-only repo access — this job only reads migrations and pushes to the DB.
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      # Apply migrations to the environment's own Supabase project, using that
      # GitHub Environment's secrets (DB password differs per project).
      #   main -> Production project (skhvbzitwvnbhqxfitgh)
      #   dev  -> Preview project    (xzvsrzbbgxbaagqwtpts)
      # --include-all pushes migrations whose version is older than the latest one
      # already applied remotely (migrations land from separate PRs, out of order).
      - name: Apply migrations
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "Supabase secrets not configured for this environment — skipping DB migrate."
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            main) REF="skhvbzitwvnbhqxfitgh" ;;  # production
            dev)  REF="xzvsrzbbgxbaagqwtpts" ;;  # preview
            *)
              echo "No Supabase project wired for '${GITHUB_REF_NAME}' — skipping."
              exit 0
              ;;
          esac
          supabase link --project-ref "$REF"
          supabase db push --include-all

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true
      - name: Check for hardcoded secrets
        run: |
          if grep -rn 'SUPABASE_ANON_KEY\s*=' --include='*.ts' --include='*.tsx' src/ | grep -v 'process.env' | grep -v '.env'; then
            echo "Hardcoded secrets found in source code"
            exit 1
          fi
          echo "No hardcoded secrets found"
