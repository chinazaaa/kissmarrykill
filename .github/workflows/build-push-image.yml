name: Build & Push Image

# Builds the app image natively on an amd64 runner (no local QEMU/SWC segfault),
# pushes it to ECR via OIDC (no stored keys), then triggers an in-place redeploy
# on the instance via SSM. All values here are non-secret (NEXT_PUBLIC_* ship in
# the client bundle; role ARN / region / repo are public identifiers).
on:
  # Auto-build the DEV image when app code lands on dev (infra/docs-only changes skip it).
  push:
    branches: [dev]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build-push-image.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [dev, prod]
        default: dev
      image_tag:
        description: "Image tag to push"
        default: latest
        required: false

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve environment config
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          echo "Target environment: $ENV"
          case "$ENV" in
            prod)
              {
                echo "ECR_REPOSITORY=fateround-prod"
                echo "DEPLOY_ROLE_ARN=arn:aws:iam::772316781095:role/fateround-prod-gha-deploy"
                echo "NEXT_PUBLIC_SUPABASE_URL=https://skhvbzitwvnbhqxfitgh.supabase.co"
                echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_daKXZ2-HKxB6k3rAy1tmGw_jQuACg0K"
                echo "NEXT_PUBLIC_APP_URL=https://fateround.com"
                echo "NEXT_PUBLIC_LIVEKIT_URL=wss://livekit.fateround.com"
              } >> "$GITHUB_ENV"
              ;;
            dev)
              # dev targets its own (preview) Supabase project — isolated from prod.
              {
                echo "ECR_REPOSITORY=fateround-dev"
                echo "DEPLOY_ROLE_ARN=arn:aws:iam::772316781095:role/fateround-dev-gha-deploy"
                echo "NEXT_PUBLIC_SUPABASE_URL=https://xzvsrzbbgxbaagqwtpts.supabase.co"
                echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_4U7akfEx_4sxtLrxeCU_Rw_VpSeFRAu"
                echo "NEXT_PUBLIC_APP_URL=https://dev.fateround.com"
                echo "NEXT_PUBLIC_LIVEKIT_URL=wss://livekit.fateround.com"
              } >> "$GITHUB_ENV"
              ;;
            *) echo "Unknown environment: $ENV" >&2; exit 1 ;;
          esac

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.event.inputs.image_tag || 'latest' }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_LIVEKIT_URL=${{ env.NEXT_PUBLIC_LIVEKIT_URL }}

      - name: Redeploy on the instance (SSM)
        # Auto-redeploy on every build: a push to dev deploys the dev box; a
        # workflow_dispatch deploys the chosen environment. The dev-project flip is
        # complete (image + runtime SSM both on the preview project), so the earlier
        # workflow_dispatch-only gate is removed. Runtime Supabase vars are kept in
        # sync via Terraform/SSM, so there's no split-brain.
        env:
          STACK: ${{ env.ECR_REPOSITORY }}
        run: |
          set -euo pipefail
          IID=$(aws ec2 describe-instances --region "$AWS_REGION" \
            --filters "Name=tag:Stack,Values=$STACK" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          if [ -z "$IID" ]; then
            echo "::error::No running instance tagged Stack=$STACK — redeploy target missing (stopped instance or broken Stack tag)."
            exit 1
          fi
          echo "Redeploying on: $IID"
          CMD=$(aws ssm send-command --region "$AWS_REGION" \
            --document-name AWS-RunShellScript \
            --instance-ids $IID \
            --comment "CI redeploy ${GITHUB_SHA::7}" \
            --parameters commands="/usr/local/bin/redeploy.sh ${GITHUB_SHA}" \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD"
          rc=0
          for iid in $IID; do
            aws ssm wait command-executed --region "$AWS_REGION" --command-id "$CMD" --instance-id "$iid" || true
            status=$(aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$CMD" --instance-id "$iid" --query 'Status' --output text)
            echo "::group::redeploy output on $iid (status=$status)"
            aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$CMD" --instance-id "$iid" --query 'StandardOutputContent' --output text || true
            aws ssm get-command-invocation --region "$AWS_REGION" --command-id "$CMD" --instance-id "$iid" --query 'StandardErrorContent' --output text || true
            echo "::endgroup::"
            [ "$status" = "Success" ] || { echo "redeploy failed on $iid: $status"; rc=1; }
          done
          exit $rc
