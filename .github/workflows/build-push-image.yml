name: Build & Push Image

# Builds the app image natively on an amd64 runner (no local QEMU/SWC segfault)
# and pushes it to ECR, authenticating to AWS via OIDC (no stored access keys).
# All values below are non-secret (NEXT_PUBLIC_* ship in the client bundle; the
# role ARN / region / repo are public identifiers).
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push"
        default: latest
        required: false

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fateround-dev
  DEPLOY_ROLE_ARN: arn:aws:iam::772316781095:role/fateround-dev-gha-deploy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ inputs.image_tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://skhvbzitwvnbhqxfitgh.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_daKXZ2-HKxB6k3rAy1tmGw_jQuACg0K
            NEXT_PUBLIC_APP_URL=https://dev.fateround.com
            NEXT_PUBLIC_LIVEKIT_URL=wss://fateround-dxjn0oj0.livekit.cloud
