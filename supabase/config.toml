# Supabase CLI config. Used by the "DB Migrate" CI job (supabase link + db push)
# to apply supabase/migrations to each environment's own project.
#
# Two-project setup (not Branching):
#   - prod = skhvbzitwvnbhqxfitgh
#   - dev  = its own project (free project in a separate org)
# The migrate job selects the project per branch via `supabase link --project-ref`,
# so project_id below is only the default/fallback for local CLI use.
#
# `supabase init` regenerates the full default file if you want finer control.

project_id = "skhvbzitwvnbhqxfitgh"

[db]
major_version = 17
