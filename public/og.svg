<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161320"/>
      <stop offset="100%" stop-color="#0d0b13"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <circle cx="1000" cy="70" r="440" fill="url(#glow)"/>
  <circle cx="720" cy="600" r="380" fill="url(#glow2)"/>

  <!-- logo -->
  <g transform="translate(64,56)">
    <rect width="56" height="56" rx="14" fill="url(#iconGrad)"/>
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M28 15 L40.5 36 L15.5 36 Z"/>
    </g>
    <circle cx="28" cy="15" r="5.2" fill="#ffffff"/>
    <circle cx="40.5" cy="36" r="5.2" fill="#ffffff"/>
    <circle cx="15.5" cy="36" r="5.2" fill="#ffffff"/>
  </g>
  <text x="134" y="95" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="30" fill="#fdf2f4">Fate<tspan fill="#fb7185">Round</tspan></text>

  <!-- eyebrow -->
  <text x="64" y="218" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="17" letter-spacing="4" fill="#fb7185">FREE ONLINE MULTIPLAYER GAMES</text>

  <!-- headline -->
  <text x="62" y="300" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="66" fill="#fdf2f4">30+ games.</text>
  <text x="62" y="372" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="66" fill="#fdf2f4">One link.</text>

  <!-- subhead -->
  <text x="64" y="430" font-family="Liberation Sans, Arial, sans-serif" font-weight="400" font-size="24" fill="#a99fb0">Monopoly, Yahtzee, Chess, Trivia &#38; more &#8212;</text>
  <text x="64" y="464" font-family="Liberation Sans, Arial, sans-serif" font-weight="400" font-size="24" fill="#a99fb0">no sign-up, just share a code.</text>

  <!-- url -->
  <text x="64" y="566" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="34" fill="#fb7185">fateround.com</text>

  <!-- game tag cloud -->
  <g font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="23" fill="#fdf2f4">
    <!-- row 1 -->
    <g><rect x="610" y="118" width="158" height="54" rx="27" fill="#f43f5e"/><text x="689" y="152" text-anchor="middle">Monopoly</text></g>
    <g><rect x="784" y="118" width="142" height="54" rx="27" fill="#8b5cf6"/><text x="855" y="152" text-anchor="middle">Yahtzee</text></g>
    <g><rect x="942" y="118" width="168" height="54" rx="27" fill="#0d9488"/><text x="1026" y="152" text-anchor="middle">Codewords</text></g>
    <!-- row 2 -->
    <g><rect x="610" y="186" width="118" height="54" rx="27" fill="#f59e0b"/><text x="669" y="220" text-anchor="middle">Trivia</text></g>
    <g><rect x="744" y="186" width="100" height="54" rx="27" fill="#0ea5e9"/><text x="794" y="220" text-anchor="middle">Whot</text></g>
    <g><rect x="860" y="186" width="100" height="54" rx="27" fill="#ec4899"/><text x="910" y="220" text-anchor="middle">Ludo</text></g>
    <g><rect x="976" y="186" width="116" height="54" rx="27" fill="#6366f1"/><text x="1034" y="220" text-anchor="middle">Chess</text></g>
    <!-- row 3 -->
    <g><rect x="610" y="254" width="152" height="54" rx="27" fill="#10b981"/><text x="686" y="288" text-anchor="middle">Scrabble</text></g>
    <g><rect x="778" y="254" width="132" height="54" rx="27" fill="#f43f5e"/><text x="844" y="288" text-anchor="middle">Sudoku</text></g>
    <g><rect x="926" y="254" width="166" height="54" rx="27" fill="#8b5cf6"/><text x="1009" y="288" text-anchor="middle">Word Hunt</text></g>
    <!-- row 4 -->
    <g><rect x="610" y="322" width="210" height="54" rx="27" fill="#0d9488"/><text x="715" y="356" text-anchor="middle">Snake &amp; Ladders</text></g>
    <g><rect x="836" y="322" width="108" height="54" rx="27" fill="#f59e0b"/><text x="890" y="356" text-anchor="middle">Bingo</text></g>
    <g><rect x="960" y="322" width="150" height="54" rx="27" fill="#0ea5e9"/><text x="1035" y="356" text-anchor="middle">Tic Tac Toe</text></g>
    <!-- row 5 -->
    <g><rect x="610" y="390" width="152" height="54" rx="27" fill="#6366f1"/><text x="686" y="424" text-anchor="middle">This or That</text></g>
    <g><rect x="778" y="390" width="158" height="54" rx="27" fill="#ec4899"/><text x="857" y="424" text-anchor="middle">Two Truths</text></g>
    <g><rect x="952" y="390" width="138" height="54" rx="27" fill="#1e1a2b" stroke="#3a3348" stroke-width="2"/><text x="1021" y="424" text-anchor="middle" fill="#cfc7d6">+15 more</text></g>
  </g>
</svg>
