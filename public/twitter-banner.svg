<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161320"/>
      <stop offset="100%" stop-color="#0d0b13"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <circle cx="1260" cy="40" r="460" fill="url(#glow)"/>
  <circle cx="980" cy="520" r="400" fill="url(#glow2)"/>

  <!-- logo lockup (top-left, clear of profile-photo zone) -->
  <g transform="translate(96,64)">
    <rect width="60" height="60" rx="15" fill="url(#iconGrad)"/>
    <g stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M30 16 L43.5 38.5 L16.5 38.5 Z"/>
    </g>
    <circle cx="30" cy="16" r="5.6" fill="#ffffff"/>
    <circle cx="43.5" cy="38.5" r="5.6" fill="#ffffff"/>
    <circle cx="16.5" cy="38.5" r="5.6" fill="#ffffff"/>
    <text x="76" y="44" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="34" fill="#fdf2f4">Fate<tspan fill="#fb7185">Round</tspan></text>
  </g>

  <!-- eyebrow -->
  <text x="98" y="208" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="18" letter-spacing="4.5" fill="#fb7185">FREE ONLINE MULTIPLAYER GAMES</text>

  <!-- headline -->
  <text x="96" y="296" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="76" fill="#fdf2f4">30+ games. One link.</text>

  <!-- subhead -->
  <text x="98" y="352" font-family="Liberation Sans, Arial, sans-serif" font-weight="400" font-size="26" fill="#a99fb0">No sign-up. No app. Just share a code and play together.</text>

  <!-- url (bottom-right: clear of the profile-photo overlap on the bottom-left) -->
  <text x="1338" y="466" text-anchor="end" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="34" fill="#fb7185">fateround.com</text>

  <!-- game tag cloud (right side, above profile-overlap zone) -->
  <g font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="24" fill="#fdf2f4">
    <!-- row 1 -->
    <g><rect x="1006" y="150" width="166" height="56" rx="28" fill="#f43f5e"/><text x="1089" y="186" text-anchor="middle">Monopoly</text></g>
    <g><rect x="1188" y="150" width="150" height="56" rx="28" fill="#8b5cf6"/><text x="1263" y="186" text-anchor="middle">Yahtzee</text></g>
    <!-- row 2 -->
    <g><rect x="1006" y="222" width="120" height="56" rx="28" fill="#f59e0b"/><text x="1066" y="258" text-anchor="middle">Trivia</text></g>
    <g><rect x="1142" y="222" width="104" height="56" rx="28" fill="#0ea5e9"/><text x="1194" y="258" text-anchor="middle">Whot</text></g>
    <g><rect x="1262" y="222" width="104" height="56" rx="28" fill="#ec4899"/><text x="1314" y="258" text-anchor="middle">Ludo</text></g>
    <!-- row 3 -->
    <g><rect x="1006" y="294" width="160" height="56" rx="28" fill="#10b981"/><text x="1086" y="330" text-anchor="middle">Scrabble</text></g>
    <g><rect x="1182" y="294" width="120" height="56" rx="28" fill="#6366f1"/><text x="1242" y="330" text-anchor="middle">Chess</text></g>
    <!-- row 4 -->
    <g><rect x="1006" y="366" width="138" height="56" rx="28" fill="#0d9488"/><text x="1075" y="402" text-anchor="middle">Sudoku</text></g>
    <g><rect x="1160" y="366" width="146" height="56" rx="28" fill="#1e1a2b" stroke="#3a3348" stroke-width="2"/><text x="1233" y="402" text-anchor="middle" fill="#cfc7d6">+25 more</text></g>
  </g>
</svg>
